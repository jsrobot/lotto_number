<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7f5ef">
    <title>Lotto QR Analyzer</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./vendor/pyodide/pyodide.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Lotto QR Analyzer</p>
          <h1>로또 QR 분석기</h1>
        </div>
        <p id="statusText" class="status-pill">준비 중</p>
      </header>

      <nav class="tab-list" aria-label="주요 기능">
        <button class="tab-button is-active" type="button" data-tab="scan">스캔</button>
        <button class="tab-button" type="button" data-tab="result">결과</button>
        <button class="tab-button" type="button" data-tab="generate">생성</button>
      </nav>

      <section id="scanPanel" class="tab-panel is-active" data-panel="scan">
        <div class="camera-panel">
          <video id="cameraPreview" class="camera-preview" muted playsinline></video>
          <div id="cameraEmpty" class="camera-empty">
            <strong>QR 스캔 대기</strong>
            <span>지원 브라우저에서는 후면 카메라로 QR을 읽을 수 있습니다.</span>
          </div>
        </div>

        <div class="button-row">
          <button id="startScanButton" class="primary-button" type="button">스캔 시작</button>
          <button id="stopScanButton" class="ghost-button" type="button" disabled>중지</button>
        </div>

        <p id="scannerSupportText" class="helper-text"></p>

        <label class="input-label" for="manualInput">QR URL 직접 입력</label>
        <textarea id="manualInput" class="manual-input" rows="4" spellcheck="false" placeholder="http://m.dhlottery.co.kr/?v=0955q010715172842q030712163541q202730353941q031328364445q021214192934"></textarea>

        <div class="button-row">
          <button id="analyzeButton" class="primary-button" type="button" disabled>분석하기</button>
          <button id="sampleButton" class="ghost-button" type="button">샘플 입력</button>
        </div>

        <p id="messageText" class="message-text" role="status"></p>
      </section>

      <section id="resultPanel" class="tab-panel" data-panel="result">
        <div id="emptyResult" class="empty-state">
          <strong>분석된 QR이 없습니다.</strong>
          <span>스캔하거나 QR URL을 입력하면 회차와 게임별 번호가 표시됩니다.</span>
        </div>

        <div id="resultContent" class="result-content" hidden>
          <section class="round-summary">
            <span>회차</span>
            <strong id="roundText">-</strong>
          </section>

          <label class="toggle-row">
            <input id="excludeAllScanned" type="checkbox">
            <span>스캔된 모든 번호 제외</span>
          </label>

          <div id="gamesList" class="games-list"></div>
        </div>
      </section>

      <section id="generatePanel" class="tab-panel" data-panel="generate">
        <section class="generator-section">
          <div class="section-title">
            <h2>직접 제외</h2>
            <button id="resetButton" class="icon-text-button" type="button">초기화</button>
          </div>
          <div id="numberGrid" class="number-grid" aria-label="제외할 번호 선택"></div>
        </section>

        <section class="generator-section">
          <div class="section-title">
            <h2>제외 요약</h2>
            <span id="availableCount" class="muted-text">45개 후보</span>
          </div>
          <div id="excludedSummary" class="excluded-summary">제외된 번호가 없습니다.</div>
        </section>

        <button id="generateButton" class="generate-button" type="button" disabled>랜덤 번호 생성</button>

        <section id="generatedResult" class="generated-result" hidden>
          <h2>생성 결과</h2>
          <div id="generatedBalls" class="balls-row"></div>
        </section>

        <section id="historySection" class="history-section" hidden>
          <h2>최근 생성</h2>
          <div id="historyList" class="history-list"></div>
        </section>
      </section>
    </main>
  </body>
</html>
