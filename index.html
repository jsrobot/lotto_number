<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="theme-color" content="#126c64">
    <meta name="apple-mobile-web-app-title" content="Lotto QR">
    <meta name="application-name" content="Lotto QR">
    <title>Lotto QR Analyzer</title>
    <link rel="manifest" href="./manifest.webmanifest?v=20260617-design-1">
    <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/icons/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/icons/favicon-16.png">
    <link rel="stylesheet" href="./src/css/styles.css?v=20260617-design-1">
    <script src="./vendor/jsqr/jsQR.js?v=20260617-reset-1"></script>
    <script src="./src/js/lotto.js?v=20260617-design-1"></script>
    <script defer src="./src/js/app.js?v=20260617-design-1"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Lotto QR Analyzer</p>
          <h1>로또 QR 분석기</h1>
        </div>
        <p id="statusText" class="status-pill">준비 중</p>
      </header>

      <nav class="tab-list" aria-label="주요 기능">
        <button class="tab-button is-active" type="button" data-tab="scan">스캔</button>
        <button class="tab-button" type="button" data-tab="result">결과</button>
        <button class="tab-button" type="button" data-tab="generate">생성</button>
      </nav>
      <div class="swipe-indicator" aria-hidden="true">
        <span class="swipe-dot is-active" data-tab-dot="scan"></span>
        <span class="swipe-dot" data-tab-dot="result"></span>
        <span class="swipe-dot" data-tab-dot="generate"></span>
      </div>

      <section id="scanPanel" class="tab-panel is-active" data-panel="scan">
        <div class="camera-panel">
          <video id="cameraPreview" class="camera-preview" muted playsinline></video>
          <div id="cameraEmpty" class="camera-empty">
            <strong>QR 스캔 대기</strong>
            <span>Android와 iPhone 모두 실시간 인식을 먼저 시도합니다.</span>
          </div>
        </div>

        <div class="button-row">
          <button id="startScanButton" class="primary-button" type="button">스캔 시작</button>
          <button id="stopScanButton" class="ghost-button" type="button" disabled>중지</button>
        </div>

        <p id="scannerSupportText" class="helper-text"></p>

        <section class="photo-scan-section is-compact">
          <span>실시간 인식이 어렵다면 사진으로 인식</span>
          <label class="photo-scan-button" for="photoInput">사진 선택</label>
          <input id="photoInput" class="visually-hidden" type="file" accept="image/*" capture="environment">
          <canvas id="qrCanvas" class="visually-hidden"></canvas>
        </section>

        <label class="input-label" for="manualInput">QR URL 직접 입력</label>
        <textarea id="manualInput" class="manual-input" rows="4" spellcheck="false" placeholder="https://m.dhlottery.co.kr/?v=0955q010715172842q030712163541q202730353941q031328364445q021214192934"></textarea>

        <div class="button-row">
          <button id="analyzeButton" class="primary-button" type="button" disabled>분석하기</button>
          <button id="sampleButton" class="ghost-button" type="button">샘플 입력</button>
        </div>

        <p id="messageText" class="message-text" role="status"></p>

        <section id="scanFlowContent" class="scan-flow-content" hidden>
          <section class="round-summary compact-summary">
            <span>회차</span>
            <strong id="scanRoundText">-</strong>
          </section>
          <p id="scanExtraDataText" class="extra-data-text" hidden></p>
          <div id="scanGamesList" class="games-list"></div>

          <section class="generator-section inline-generator">
            <div class="section-title">
              <h2>제외 요약</h2>
              <span id="scanAvailableCount" class="muted-text">45개 후보</span>
            </div>
            <div id="scanExcludedSummary" class="excluded-summary">제외된 번호가 없습니다.</div>
          </section>

          <section class="generator-section generation-action-section">
            <div class="game-count-section">
              <div class="section-title">
                <h2>생성 게임 수</h2>
                <span class="muted-text">최대 5게임</span>
              </div>
              <select id="scanGameCountSelect" class="game-count-select" aria-label="생성할 게임 수">
                <option value="1">1게임</option>
                <option value="2">2게임</option>
                <option value="3">3게임</option>
                <option value="4">4게임</option>
                <option value="5" selected>5게임</option>
              </select>
            </div>
            <button id="scanGenerateButton" class="generate-button" type="button">랜덤 번호 생성</button>
          </section>

          <section id="scanGeneratedResult" class="generated-result" hidden>
            <h2>생성 결과</h2>
            <div id="scanGeneratedBalls" class="generated-games-list"></div>
          </section>
        </section>
      </section>

      <section id="resultPanel" class="tab-panel" data-panel="result">
        <div id="emptyResult" class="empty-state">
          <strong>분석된 QR이 없습니다.</strong>
          <span>스캔하거나 QR URL을 입력하면 회차와 게임별 번호가 표시됩니다.</span>
        </div>

        <div id="resultContent" class="result-content" hidden>
          <section class="round-summary">
            <span>회차</span>
            <strong id="roundText">-</strong>
          </section>
          <p id="extraDataText" class="extra-data-text" hidden></p>

          <label class="toggle-row">
            <input id="excludeAllScanned" type="checkbox">
            <span>스캔된 모든 번호 제외</span>
          </label>

          <div id="gamesList" class="games-list"></div>
        </div>
      </section>

      <section id="generatePanel" class="tab-panel" data-panel="generate">
        <section class="generator-section">
          <div class="section-title">
            <h2>직접 제외</h2>
            <button id="resetButton" class="icon-text-button" type="button">초기화</button>
          </div>
          <div id="numberGrid" class="number-grid" aria-label="제외할 번호 선택"></div>
        </section>

        <section class="generator-section">
          <div class="section-title">
            <h2>제외 요약</h2>
            <span id="availableCount" class="muted-text">45개 후보</span>
          </div>
          <div id="excludedSummary" class="excluded-summary">제외된 번호가 없습니다.</div>
        </section>

        <section class="generator-section generation-action-section">
          <div class="game-count-section">
            <div class="section-title">
              <h2>생성 게임 수</h2>
              <span class="muted-text">최대 5게임</span>
            </div>
            <select id="gameCountSelect" class="game-count-select" aria-label="생성할 게임 수">
              <option value="1">1게임</option>
              <option value="2">2게임</option>
              <option value="3">3게임</option>
              <option value="4">4게임</option>
              <option value="5" selected>5게임</option>
            </select>
          </div>
          <button id="generateButton" class="generate-button" type="button" disabled>랜덤 번호 생성</button>
        </section>

        <section id="generatedResult" class="generated-result" hidden>
          <h2>생성 결과</h2>
          <div id="generatedBalls" class="generated-games-list"></div>
        </section>

        <section id="historySection" class="history-section" hidden>
          <h2>최근 생성</h2>
          <div id="historyList" class="history-list"></div>
        </section>
      </section>
    </main>
  </body>
</html>
